<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Emergency Close</title>
<script src="/ethers.min.js"></script>
<style>
body{font-family:system-ui;background:#0a0a0b;color:#e8e8ea;padding:20px;max-width:600px;margin:0 auto}
h1{font-size:18px;color:#ff5252}
.btn{padding:10px 20px;border:0;border-radius:6px;cursor:pointer;font-weight:700;font-size:14px;margin:4px}
.btn-blue{background:#448aff;color:#fff}
.btn-red{background:#ff5252;color:#fff}
.btn-green{background:#00e676;color:#000}
.card{background:#141416;border:1px solid #2a2a2e;border-radius:8px;padding:12px;margin:8px 0}
.card h3{font-size:14px;margin:0 0 8px}
.log{background:#000;border:1px solid #333;border-radius:6px;padding:8px;font-family:monospace;font-size:11px;max-height:300px;overflow-y:auto}
.log .ok{color:#0f0}.log .err{color:#f00}.log .warn{color:#fa0}.log .info{color:#888}
</style>
</head>
<body>
<h1>🚨 Emergency CloseTool</h1>
<div class="card">
<h3>1. Connect Wallet</h3>
<button class="btn btn-blue" onclick="doConnect()">Connect Wallet</button>
<span id="addr" style="font-size:12px;color:#888"></span>
</div>
<div class="card">
<h3>2. Your Positions</h3>
<div id="positions">Connect Wallet to view...</div>
</div>
<div class="card">
<h3>3. Log</h3>
<div class="log" id="log"></div>
</div>

<script>
var UA,S,R,C={rpc:'https://rpc.testnet.arc.network',cid:5042002,hex:'0x4CEF52',per:'0x0F912AB9072958E859daEfC44f76868304e2fD88',orc:'0x275cece70331cCA5579C9bA01Da660b4139DfA4D'};
var SYMS=[{k:'BINANCE:BTCUSDT',l:'BTC/USDC',s:'BTCUSDT'},{k:'BINANCE:ETHUSDT',l:'ETH/USDC',s:'ETHUSDT'},{k:'BINANCE:BNBUSDT',l:'BNB/USDC',s:'BNBUSDT'},{k:'BINANCE:SOLUSDT',l:'SOL/USDC',s:'SOLUSDT'},{k:'BINANCE:XRPUSDT',l:'XRP/USDC',s:'XRPUSDT'},{k:'BINANCE:SUIUSDT',l:'SUI/USDC',s:'SUIUSDT'},{k:'BINANCE:ZECUSDT',l:'ZEC/USDC',s:'ZECUSDT'},{k:'BINANCE:AAVEUSDT',l:'AAVE/USDC',s:'AAVEUSDT'},{k:'BINANCE:UNIUSDT',l:'UNI/USDC',s:'UNIUSDT'},{k:'BINANCE:LINKUSDT',l:'LINK/USDC',s:'LINKUSDT'},{k:'BINANCE:ONDOUSDT',l:'ONDO/USDC',s:'ONDOUSDT'},{k:'NASDAQ:CRCL',l:'CRCL/USDC',s:'CRCL'},{k:'NASDAQ:TSLA',l:'TSLA/USDC',s:'TSLA'},{k:'NASDAQ:NVDA',l:'NVDA/USDC',s:'NVDA'},{k:'NASDAQ:MSFT',l:'MSFT/USDC',s:'MSFT'},{k:'NASDAQ:GOOGL',l:'GOOGL/USDC',s:'GOOGL'},{k:'NASDAQ:AAPL',l:'AAPL/USDC',s:'AAPL'},{k:'NASDAQ:MU',l:'MU/USDC',s:'MU'},{k:'NASDAQ:AMZN',l:'AMZN/USDC',s:'AMZN'},{k:'NASDAQ:INTC',l:'INTC/USDC',s:'INTC'},{k:'NASDAQ:AMD',l:'AMD/USDC',s:'AMD'},{k:'NASDAQ:WDC',l:'WDC/USDC',s:'WDC'},{k:'NASDAQ:SNDK',l:'SNDK/USDC',s:'SNDK'},{k:'NASDAQ:BABA',l:'BABA/USDC',s:'BABA'},{k:'NASDAQ:MRVL',l:'MRVL/USDC',s:'MRVL'},{k:'NASDAQ:AMAT',l:'AMAT/USDC',s:'AMAT'},{k:'NASDAQ:SKHYNIX',l:'SKHYNIX/USDC',s:'SKHYNIX'},{k:'NASDAQ:SPCX',l:'SPCX/USDC',s:'SPCX'},{k:'NASDAQ:HOOD',l:'HOOD/USDC',s:'HOOD'},{k:'NASDAQ:XAG',l:'XAG/USDC',s:'XAG'},{k:'NASDAQ:XAU',l:'XAU/USDC',s:'XAU'}];

function log(m,c){var l=document.getElementById('log');l.innerHTML+='<div class="'+(c||'info')+'">'+new Date().toLocaleTimeString()+' '+m+'</div>';l.scrollTop=l.scrollHeight}
function em(e){return e&&(e.shortMessage||e.message||String(e))}

async function doConnect(){
  var w=window.ethereum||window.okxwallet;
  if(!w)return log('No wallet detected','err');
  try{
    try{await w.request({method:'wallet_switchEthereumChain',params:[{chainId:C.hex}]});}catch(e){if(e.code===4902){await w.request({method:'wallet_addEthereumChain',params:[{chainId:C.hex,chainName:'Arc Testnet',rpcUrls:[C.rpc],nativeCurrency:{name:'ETH',symbol:'ETH',decimals:18}}]});await w.request({method:'wallet_switchEthereumChain',params:[{chainId:C.hex}]});}}
    var a=await w.request({method:'eth_requestAccounts'});UA=a[0];
    S=await(new ethers.BrowserProvider(w)).getSigner();R=new ethers.JsonRpcProvider(C.rpc);
    document.getElementById('addr').textContent=UA.slice(0,8)+'...'+UA.slice(-6);
    log('Connected: '+UA,'ok');
    await loadPositions();
  }catch(e){log('Connection failed: '+em(e),'err')}
}

async function loadPositions(){
  var perp=new ethers.Contract(C.per,['function getUserPositions(address) view returns (uint256[])','function getPosition(uint256) view returns (tuple(address,uint8,uint8,uint256,uint256,uint256,uint256,uint256,uint256,bool,bool))'],R);
  var ids=await perp.getUserPositions(UA);
  log('Found '+ids.length+'  positions');
  var h='';
  for(var i=ids.length-1;i>=0;i--){
    try{
      var id=Number(ids[i]),po=await perp.getPosition(id);
      if(po[9]){log('#'+id+' Closed，Skipped');continue;}
      var si=SYMS[Number(po[2])];
      h+='<div style="display:flex;align-items:center;gap:8px;padding:6px;background:#1c1c1f;border-radius:4px;margin:4px 0">'+
        '<span style="font-weight:700;min-width:60px">#'+id+'</span>'+
        '<span style="min-width:80px">'+(si?si.l:'pair='+po[2])+'</span>'+
        '<span style="min-width:60px;color:'+(po[1]===0?'#0f0':'#f00')+'">'+(po[1]===0?'LONG':'SHORT')+'</span>'+
        '<span style="min-width:80px">entry $'+(Number(po[5])/1e8).toFixed(4)+'</span>'+
        '<button style="background:#ff5252;color:#fff;border:0;border-radius:4px;padding:4px 12px;cursor:pointer;font-weight:700" onclick="closeOne('+id+')">Close</button>'+
        '</div>';
    }catch(e){log('#'+ids[i]+' Error: '+em(e),'err')}
  }
  document.getElementById('positions').innerHTML=h||'No active positions';
}

async function closeOne(pid){
  log('=== Close #'+pid+' ===');
  if(!UA||!S)return log('Please Connect Wallet','err');
  
  try{
    var perp=new ethers.Contract(C.per,['function getPosition(uint256) view returns (tuple(address,uint8,uint8,uint256,uint256,uint256,uint256,uint256,uint256,bool,bool))'],R);
    var po=await perp.getPosition(pid);
    var pairIdx=Number(po[2]);
    var si=SYMS[pairIdx];
    log('Position #'+pid+': pair='+pairIdx+' ('+(si?si.l:'?')+') entry='+(Number(po[5])/1e8).toFixed(4)+' side='+(po[1]===0?'LONG':'SHORT')+' closed='+po[9],'info');
    
    if(po[9]){log('already closed！','warn');return;}
    
    // Get price - try Binance first
    var cp=0;
    if(si){
      try{
        var r=await fetch('https://api.binance.com/api/v3/ticker/price?symbol='+si.s);
        if(r.ok){var d=await r.json();cp=parseFloat(d.price);log('BinancePrice: $'+cp.toFixed(4),'ok')}
      }catch(e){}
    }
    
    // Fallback: use /api/prices
    if(!cp){
      try{
        var r2=await fetch('/api/prices');
        if(r2.ok){
          var all2=await r2.json();
          if(si&&all2[si.s]&&all2[si.s].p){cp=all2[si.s].p;log('/api/prices: $'+cp.toFixed(4),'ok')}
        }
      }catch(e){}
    }
    
    // Last fallback: entry price
    if(!cp||cp<=0){cp=Number(po[5])/1e8;log('UseentryPrice: $'+cp.toFixed(4),'warn')}
    if(!cp||cp<=0)return log('Cannot fetchPrice','err');
    
    // Step 1: Update Oracle
    var ow=new ethers.Wallet('0xa66826b8c82d112ae1edc61d53b1519741c06af822e78ad85597e76502d02826',R);
    var owNonce=await R.getTransactionCount(ow.address);
    log('_ow nonce: '+owNonce,'info');
    try{
      var priceRaw=ethers.parseUnits(cp.toFixed(8),8);
      var orx=await ow.sendTransaction({to:C.orc,data:new ethers.Interface(['function updatePrice(uint256)']).encodeFunctionData('updatePrice',[priceRaw]),gasLimit:300000,nonce:owNonce});
      log('OracleUpdate tx: '+orx.hash.slice(0,14)+'...');
      await orx.wait();
      log('OracleUpdateto $'+cp.toFixed(4),'ok');
    }catch(e2){
      log('OracleUpdateFailed: '+em(e2),'err');
      // Continue anyway
    }
    
    // Step 2: Close position
    log('SendCloseTx...');
    var tx=await S.sendTransaction({to:C.per,data:new ethers.Interface(['function closePosition(uint256)']).encodeFunctionData('closePosition',[pid]),gasLimit:2000000});
    log('Close tx: '+tx.hash.slice(0,14)+'...');
    var rc=await tx.wait();
    log('✅ Close #'+pid+'! block '+rc.blockNumber,'ok');
    
    // Refresh
    setTimeout(loadPositions,2000);
  }catch(e){
    log('❌ CloseFailed: '+em(e),'err');
    if(e.data)log('Revert: '+e.data,'err');
  }
}
</script>
</body>
</html>
